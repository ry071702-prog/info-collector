name: Process & Daily Digest
on:
  schedule:
    - cron: '0 10,22 * * *'  # JST 19:00 / 07:00
  workflow_dispatch:
    inputs:
      dry_run:
        description: '外部書き込みをスキップ（Notion/Sheets/Discord）。Gemini呼び出しは実行する'
        type: boolean
        default: false
      as_of:
        description: '基準時刻 (ISO8601 UTC、例: 2026-05-27T00:00:00Z)。空なら現在時刻。過去日復旧用'
        type: string
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: process-digest

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r requirements.txt
      - name: Process
        env:
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          PROCESS_AS_OF: ${{ inputs.as_of || '' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 || '' }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID_GAMES: ${{ secrets.NOTION_DATABASE_ID_GAMES }}
          NOTION_DATABASE_ID_ANIME: ${{ secrets.NOTION_DATABASE_ID_ANIME }}
          NOTION_DATABASE_ID_DISNEY: ${{ secrets.NOTION_DATABASE_ID_DISNEY }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          DISCORD_WEBHOOK_PRIORITY: ${{ secrets.DISCORD_WEBHOOK_PRIORITY }}
          DISCORD_WEBHOOK_OPS: ${{ secrets.DISCORD_WEBHOOK_OPS }}
          DISCORD_WEBHOOK_ALERTS: ${{ secrets.DISCORD_WEBHOOK_ALERTS }}
        run: python -m src.jobs.process_digest
      - name: Generate newspaper image
        # 当日の digest から新聞風 1 枚画像を生成 (site/public/newspaper-img/<date>.png)。
        # 失敗してもダイジェスト本体の commit は止めない。当日分が既にあればスクリプト側でスキップ。
        if: ${{ inputs.dry_run != true }}
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # 既定は日本語テキスト描画が正確な pro (flash-image は日本語が崩れるため)。
          # コスト抑制したい場合は repo variable で gemini-2.5-flash-image を指定。1日1枚=月¥600〜1,100目安。
          NEWSPAPER_IMAGE_MODEL: ${{ vars.NEWSPAPER_IMAGE_MODEL || 'gemini-3-pro-image-preview' }}
        run: python scripts/generate_newspaper_image.py
      - name: Commit
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git add data/processed docs/digests data/cache data/logs site/public/newspaper-img || true
          git diff --quiet --staged || git commit -m "digest $(date -u +%F)"
          for i in 1 2 3; do
            git pull --rebase --autostash -X theirs && git push && break
            echo "push attempt $i failed; retrying..."
            git rebase --abort 2>/dev/null || true
            sleep $((i * 5))
          done
