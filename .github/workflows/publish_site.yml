name: Publish News Site

on:
  workflow_run:
    workflows: ["Process & Daily Digest"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Build site data
        run: python scripts/build_site_data.py

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Build Astro site
        working-directory: site
        env:
          # Cloudflare Pages 配信時の絶対 URL とベースパス。
          # Direct Upload 構成では base=/ で良いので明示的に "/" を渡す。
          PUBLIC_SITE_URL: "https://info-collector-a5y.pages.dev"
          PUBLIC_BASE_PATH: "/"
        run: npm run build

      - name: Ensure Cloudflare Pages project exists
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 初回のみ作成。既存ならエラーで止まるので || true で抑制。
          command: pages project create info-collector --production-branch=main
        continue-on-error: true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # site/wrangler.toml (pages_build_output_dir=./dist, D1 binding) と
          # site/functions/ (Pages Functions) を含めてデプロイするため site/ で実行する。
          # Cloudflare API は長文/多バイトの commit message を invalid UTF-8 として
          # reject することがあるため、明示的に短い ASCII (1単語) を渡す。
          workingDirectory: site
          command: >-
            pages deploy
            --project-name=info-collector
            --branch=main
            --commit-hash=${{ github.sha }}
            --commit-message=ci
