name: Collect Regular (3h)
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect-regular

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r requirements.txt
      - name: Collect
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 || '' }}
          X_ACCOUNTS: ${{ secrets.X_ACCOUNTS }}
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          DISCORD_WEBHOOK_ALERTS: ${{ secrets.DISCORD_WEBHOOK_ALERTS }}
        run: python -m src.jobs.collect 6h
      - name: Commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git add data/raw data/cache data/logs || true
          git diff --quiet --staged || git commit -m "raw data $(date -u +%FT%TZ) [regular]"
          for i in 1 2 3; do
            git pull --rebase --autostash -X theirs && git push && break
            echo "push attempt $i failed; retrying..."
            git rebase --abort 2>/dev/null || true
            sleep $((i * 5))
          done
