name: Weekly Maintenance (Claude)

on:
  schedule:
    - cron: '0 18 * * 6'  # 03:00 JST Sunday
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git for bot
        run: |
          git config user.name "claude-bot"
          git config user.email "claude-bot@users.noreply.github.com"

      - name: Run maintenance
        # ベストエフォートの自動メンテ。エージェントが制限ターン内に PR を
        # 作れず exit 1 で終わってもワークフローを失敗扱いにせず通知を出さない。
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          claude --print \
            --model claude-haiku-4-5 \
            --max-turns 30 \
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash(git:*),Bash(gh:*),Bash(pytest:*),Bash(ruff:*),Bash(black:*),Bash(isort:*),Bash(pip:*),Bash(python3:*),Bash(ls:*),Bash(cat:*),Bash(find:*),Bash(date:*),Bash(echo:*),Bash(rm:*),Bash(mkdir:*),Bash(cp:*),Bash(mv:*)" \
            <<'PROMPT'
          あなたは info-collector プロジェクトの自動メンテナンス担当エージェントです。

          # 🎯 唯一のゴール
          **このセッションを「最低 1 つの PR を main に対して作成済み」の状態で終わらせる。**
          PR 作成は最終工程ではなく、できるだけ早期に到達するべきマイルストーン。

          # 推奨フロー (Plan→Branch→Implement→PR を1つの単位で繰り返す)

          ## ステップ 1: 偵察 (最大 3 turn)
          - `ls`, `cat CLAUDE.md` で方針把握
          - 「🤖 自動メンテナンスエージェント向け」セクションの禁止/推奨を必ず読む

          ## ステップ 2: タスク選定 (1 turn)
          以下の "Easy Win" から **1 つだけ** ピックアップ:
          - ruff/black/isort によるフォーマット自動修正 (`ruff format src/` など)
          - 単一モジュールにテスト追加 (1ファイルだけ、150 行以内)
          - 1 パッケージだけ依存更新
          - 1 ファイル分の typo/docstring 改善
          - 1 ファイル分の型ヒント追加

          ## ステップ 3: ブランチ即作成 (1 turn)
          ```
          git checkout -b claude/auto-<theme>-$(date +%Y%m%d-%H%M)
          ```

          ## ステップ 4: 実装 (5〜15 turn)
          選んだタスクだけを実装。スコープを広げない。

          ## ステップ 5: 必ず即 PR 化 (3 turn)
          実装が終わったら **躊躇なく** 以下を順番に実行:
          ```
          git add -A
          git commit -m "<short summary>"
          git push -u origin <branch>
          gh pr create --title "..." --body "..."
          ```
          PR 本文には: 変更概要 / 動機 / リスク評価 (低中高) / レビュー確認ポイント

          ## ステップ 6: 終了 (ループしない)
          **1 実行 = 最大 1 PR。** ステップ 5 で PR を作成したら、
          追加の Easy Win には着手せず、その時点で終了する (コスト抑制のため)。
          作りかけで終わるくらいなら、小さくても PR まで持っていく。

          # 厳守ルール
          ⛔ 絶対禁止:
          - main / master への直接コミット (必ず別ブランチ + PR)
          - force push, git reset --hard
          - 実 API への通信 (Gemini/Notion/Sheets/Discord/YouTube/Twitch すべてモック)
          - secrets / .env の変更
          - data/raw/, data/processed/ の改変
          - 本番ジョブ (.github/workflows/) を破壊する変更
          - 1 PR で 5 ファイル超を変更しない (テストファイル追加は例外)

          # ⚠️ 最重要 (必ず守る)
          ターン残数が **20 を切ったら**、その時点でやりかけの作業を必ず:
          1. commit
          2. push
          3. `gh pr create` (draft でも可)
          まで実行して終了。中途半端な未 push 状態で終わらない。

          # 出力
          最後に作成した PR の URL リストを必ず出力すること。
          PROMPT
