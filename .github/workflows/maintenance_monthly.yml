name: Monthly Maintenance
on:
  schedule:
    - cron: '0 0 1 * *'  # 1st of every month UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r requirements.txt
      - name: Run maintenance
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_OPS: ${{ secrets.DISCORD_WEBHOOK_OPS }}
          DISCORD_WEBHOOK_ALERTS: ${{ secrets.DISCORD_WEBHOOK_ALERTS }}
        run: python -m src.jobs.maintenance_monthly
      - name: Commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git add docs/monthly data/logs || true
          git diff --quiet --staged || git commit -m "maintenance $(date -u +%Y-%m)"
          git pull --rebase --autostash
          git push
