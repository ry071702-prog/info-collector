name: Notify Priority (S/A)
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: notify-priority

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12', cache: 'pip' }
      - run: pip install -r requirements.txt
      - name: Notify
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_PRIORITY: ${{ secrets.DISCORD_WEBHOOK_PRIORITY }}
          DISCORD_WEBHOOK_ALERTS: ${{ secrets.DISCORD_WEBHOOK_ALERTS }}
        run: python -m src.jobs.notify_priority
      - name: Commit dedup cache
        run: |
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git add data/cache || true
          git diff --quiet --staged || git commit -m "notify cache $(date -u +%FT%TZ)"
          git pull --rebase --autostash
          git push
