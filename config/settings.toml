# ============================================================
# 全体設定
# ============================================================
[general]
timezone = "Asia/Tokyo"
default_language = "ja"

# ============================================================
# モデル選択
# ============================================================
[models]
# Gemini free tier:
# - flash: 15 RPM / 1500 RPD（量を捌く処理向け）
# - pro:    2 RPM / 50  RPD（高品質・低頻度処理向け）
filter = "gemini-2.0-flash"
classify = "gemini-2.0-flash"
dedup = "gemini-2.0-flash-lite"
digest = "gemini-2.0-flash"
weekly_report = "gemini-1.5-pro"
maintenance = "gemini-1.5-pro"

# ============================================================
# 各ジョブのバッチサイズ（メモリ管理）
# ============================================================
[batch_sizes]
classify_batch = 20
dedup_batch = 50

# ============================================================
# リトライポリシー
# ============================================================
[retry]
network_max = 3
ratelimit_max = 5
claude_max = 10
backoff_base = 2.0
backoff_max = 300.0
jitter_pct = 0.2

# ============================================================
# サーキットブレーカー
# ============================================================
[circuit_breaker]
x_consecutive_failures = 3
notion_failure_rate_24h = 0.5

# ============================================================
# 通知レート制限
# ============================================================
[notification_throttle]
same_error_window_minutes = 30
priority_dedup_window_hours = 24

# ============================================================
# コレクター設定
# ============================================================
[collectors.x]
tweets_per_user_max = 50
search_results_max = 30

[collectors.youtube]
rss_entries_max = 15

[collectors.twitch]
recent_streams_max = 10
recent_videos_max = 5

[collectors.youtube_search]
# search.list 1 回 = 100 quota units（YouTube Data API v3 free tier 10000/日）
max_results = 25      # 1 クエリあたり取得件数（最大 50）
order = "date"        # date | relevance | viewCount | rating

[collectors.youtube_trending]
# videos.list (chart=mostPopular) 1 回 = 1 quota unit
max_results = 30      # 1 リクエストあたり取得件数（最大 50）

# ============================================================
# データ保持期間（maintenance_monthly が古い分を削除）
# ============================================================
[retention]
raw_days = 60     # data/raw/<date>/ を超過分削除
logs_days = 30    # data/logs/ 配下のファイルを超過分削除
# data/processed/ は archive 扱いで削除しない
# data/cache/ は dedup や api_usage が自己プルーニングするので対象外

# ============================================================
# スコアリング（β: risk_level + 配信者文脈スコア）
# 設定値だけでチューニング可能。コード再デプロイ不要。
# ============================================================
[scoring]
# final_priority 合成時の重み（合計 1.0 推奨）
weight_importance = 0.5      # Gemini の S/A/B/C ベース重要度
weight_freshness = 0.2       # 鮮度（投稿からの経過時間）
weight_streamer = 0.15       # streamer_influence_score
weight_virality = 0.10       # clip_virality_score
weight_trend = 0.05          # game_trend_from_streamers_score
weight_live = 0.10           # live_trend_score (Twitch 同接)

# final_priority 閾値（合成スコア 0-100 ベース）
final_S_threshold = 80
final_A_threshold = 60
final_B_threshold = 35

# 鮮度スコア（時間→点数。線形補間）
freshness_24h = 100
freshness_72h = 70
freshness_1week = 40
freshness_old = 10
